<svg width="100%" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f1f36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#1e4078"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0"/>
    </radialGradient>
    <style>
      .blip   { animation: pulse 2.4s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
      .scan   { animation: scan 3.6s linear infinite; }
      @keyframes scan { from { stroke-dashoffset: 240; } to { stroke-dashoffset: 0; } }
      .commit { animation: fadein 0.5s ease forwards; opacity: 0; }
      @keyframes fadein { to { opacity: 1; } }
    </style>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>
  <rect width="1200" height="220" fill="url(#glow)"/>

  <!-- subtle grid/circuit lines -->
  <g stroke="#1e4078" stroke-width="1" opacity="0.35">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <path d="M900,0 L900,60 L960,60 L960,220" fill="none"/>
    <path d="M1050,0 L1050,90 L1120,90 L1120,220" fill="none"/>
  </g>

  <!-- name -->
  <text x="60" y="100" font-size="46" font-weight="700" fill="#e6edf3">
    Akshat Barve
  </text>

  <!-- role line -->
  <text x="60" y="140" font-size="20" fill="#4A90D9">
    Cloud &amp; DevOps Engineer <tspan fill="#6e7681">·</tspan> Building on AWS
  </text>

  <!-- underline accent -->
  <rect x="60" y="155" width="300" height="4" rx="2" fill="url(#accent)"/>

  <!-- tagline -->
  <text x="60" y="185" font-size="14" fill="#8b949e">
    Terraform · CI/CD · Observability · Serverless
  </text>

  <!-- RIGHT SIDE: live status panel, replaces the isometric cloud icon -->
  <g transform="translate(890,44)">
    <rect x="0" y="0" width="260" height="132" rx="8" fill="#0f1720" stroke="#1e4078" stroke-width="1.5"/>
    <rect x="0" y="0" width="260" height="24" rx="8" fill="#161b22"/>
    <rect x="0" y="12" width="260" height="12" fill="#161b22"/>
    <circle cx="14" cy="12" r="4" fill="#ff5f56"/>
    <circle cx="28" cy="12" r="4" fill="#ffbd2e"/>
    <circle cx="42" cy="12" r="4" fill="#27c93f"/>
    <text x="130" y="16" text-anchor="middle" font-size="9" fill="#6e7681">prod · us-east-1</text>

    <!-- status rows -->
    <circle cx="16" cy="42" r="4" fill="#3fb950" class="blip"/>
    <text x="28" y="46" font-size="12" fill="#c9d1d9">api-gateway</text>
    <text x="220" y="46" font-size="11" fill="#3fb950" text-anchor="end">up</text>

    <circle cx="16" cy="64" r="4" fill="#3fb950" class="blip" style="animation-delay:0.4s"/>
    <text x="28" y="68" font-size="12" fill="#c9d1d9">lambda-workers</text>
    <text x="220" y="68" font-size="11" fill="#3fb950" text-anchor="end">up</text>

    <circle cx="16" cy="86" r="4" fill="#3fb950" class="blip" style="animation-delay:0.8s"/>
    <text x="28" y="90" font-size="12" fill="#c9d1d9">cost-anomaly-svc</text>
    <text x="220" y="90" font-size="11" fill="#3fb950" text-anchor="end">up</text>

    <!-- scanning heartbeat line -->
    <polyline points="10,112 40,112 50,100 60,120 70,108 80,112 250,112"
              fill="none" stroke="#4A90D9" stroke-width="1.5"
              stroke-dasharray="6 4" class="scan"/>
  </g>

  <!-- bottom strip: mini commit / pipeline history -->
  <g transform="translate(60,200)" font-size="11" fill="#6e7681">
    <text x="0" y="0" class="commit" style="animation-delay:0.2s">$ git log --oneline -3</text>
    <text x="230" y="0" class="commit" style="animation-delay:0.9s" fill="#4A90D9">a1c9e2f</text>
    <text x="300" y="0" class="commit" style="animation-delay:0.9s">fix: lambda cold start latency</text>
    <text x="620" y="0" class="commit" style="animation-delay:1.6s" fill="#4A90D9">7f3b0d1</text>
    <text x="690" y="0" class="commit" style="animation-delay:1.6s">chore: terraform module v2</text>
  </g>
</svg>
