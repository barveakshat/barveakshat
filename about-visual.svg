<svg width="480" height="480" viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
<defs>
  <radialGradient id="haze" cx="50%" cy="30%" r="60%">
    <stop offset="0%" stop-color="#1e4078" stop-opacity="0.45"/>
    <stop offset="100%" stop-color="#1e4078" stop-opacity="0"/>
  </radialGradient>
  <style>
    .lbl    { font-size: 13px; fill: #c9d1d9; }
    .sub    { font-size: 10px; fill: #6e7681; }
    .check  { opacity: 0; animation: pop 0.4s ease forwards; }
    @keyframes pop { to { opacity: 1; } }
    .spin   { transform-origin: center; animation: spin 1.4s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pulse  { animation: pulse 2.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .bar    { animation: fill 1.8s ease forwards; }
    @keyframes fill { from { stroke-dashoffset: 300; } to { stroke-dashoffset: 60; } }
  </style>
</defs>

<rect width="480" height="480" rx="14" fill="#0a1018"/>
<rect width="480" height="480" rx="14" fill="url(#haze)"/>

<rect x="0" y="0" width="480" height="34" fill="#161b22"/>
<circle cx="20" cy="17" r="5" fill="#ff5f56"/>
<circle cx="38" cy="17" r="5" fill="#ffbd2e"/>
<circle cx="56" cy="17" r="5" fill="#27c93f"/>
<text x="240" y="22" text-anchor="middle" font-size="11" fill="#6e7681">Actions — build-akshat.yml</text>

<text x="28" y="66" class="lbl" font-weight="600" font-size="14" fill="#e6edf3">Run #142 · main</text>
<text x="28" y="84" class="sub">triggered by push · 2m ago</text>

<!-- pipeline steps: each row is 42px tall, circle r=9, plenty of clearance -->
<g transform="translate(28,112)">
  <circle cx="10" cy="0" r="9" fill="none" stroke="#3fb950" stroke-width="2"/>
  <path d="M6,0 L9,3 L15,-4" fill="none" stroke="#3fb950" stroke-width="2" class="check" style="animation-delay:0.2s"/>
  <text x="32" y="4" class="lbl">compile: AkshatBarve.java</text>
  <text x="420" y="4" text-anchor="end" class="sub">0.8s</text>
</g>

<g transform="translate(28,154)">
  <circle cx="10" cy="0" r="9" fill="none" stroke="#3fb950" stroke-width="2"/>
  <path d="M6,0 L9,3 L15,-4" fill="none" stroke="#3fb950" stroke-width="2" class="check" style="animation-delay:0.9s"/>
  <text x="32" y="4" class="lbl">test: expertise[] × 5</text>
  <text x="420" y="4" text-anchor="end" class="sub">1.2s</text>
</g>

<g transform="translate(28,196)">
  <circle cx="10" cy="0" r="9" fill="none" stroke="#3fb950" stroke-width="2"/>
  <path d="M6,0 L9,3 L15,-4" fill="none" stroke="#3fb950" stroke-width="2" class="check" style="animation-delay:1.6s"/>
  <text x="32" y="4" class="lbl">deploy: building[] to prod</text>
  <text x="420" y="4" text-anchor="end" class="sub">3.4s</text>
</g>

<g transform="translate(28,238)">
  <circle cx="10" cy="0" r="9" fill="none" stroke="#4A90D9" stroke-width="2" stroke-dasharray="14 10" class="spin"/>
  <text x="32" y="4" class="lbl" fill="#4A90D9" font-size="12">applying: goal = "Cloud/DevOps/SRE"</text>
  <text x="420" y="4" text-anchor="end" class="sub">running</text>
</g>

<line x1="28" y1="272" x2="452" y2="272" stroke="#1e4078" stroke-width="1" opacity="0.5"/>

<!-- coverage ring -->
<g transform="translate(110,360)">
  <circle r="55" fill="none" stroke="#161b22" stroke-width="10"/>
  <circle r="55" fill="none" stroke="#4A90D9" stroke-width="10"
          stroke-dasharray="345" stroke-dashoffset="60" class="bar"
          transform="rotate(-90)" stroke-linecap="round"/>
  <text text-anchor="middle" y="6" font-size="20" font-weight="700" fill="#e6edf3">92%</text>
  <text text-anchor="middle" y="24" font-size="9" fill="#6e7681">skill coverage</text>
</g>

<!-- right side stat stack: label left-aligned, value right-aligned, 40px row height so nothing collides -->
<g transform="translate(230,320)" class="lbl">
  <circle cx="0" cy="0" r="4" fill="#3fb950" class="pulse"/>
  <text x="14" y="4">certifications</text>
  <text x="222" y="4" text-anchor="end" font-size="11" fill="#8b949e">3 issued</text>

  <circle cx="0" cy="40" r="4" fill="#3fb950" class="pulse" style="animation-delay:0.4s"/>
  <text x="14" y="44">CGPA</text>
  <text x="222" y="44" text-anchor="end" font-size="11" fill="#8b949e">8.92 / 10</text>

  <circle cx="0" cy="80" r="4" fill="#3fb950" class="pulse" style="animation-delay:0.8s"/>
  <text x="14" y="84">status</text>
  <text x="222" y="84" text-anchor="end" font-size="11" fill="#3fb950">open to work</text>
</g>

<text x="240" y="450" text-anchor="middle" font-size="10" fill="#6e7681">build passing · last deploy 2m ago</text>
</svg>
