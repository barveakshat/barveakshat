<svg width="820" height="300" viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, Consolas, monospace">
  <defs>
    <style>
      .win   { fill: #0d1117; stroke: #1e4078; stroke-width: 1.5; }
      .bar   { fill: #161b22; }
      .dot   { r: 6; }
      .txt   { font-size: 14px; fill: #c9d1d9; }
      .prompt{ fill: #4A90D9; font-weight: 600; }
      .ok    { fill: #3fb950; }
      .info  { fill: #58a6ff; }
      .dim   { fill: #6e7681; }
      .cursor{ fill: #4A90D9; }
      .line  { opacity: 0; animation: reveal 0.4s ease forwards; }
      @keyframes reveal { to { opacity: 1; } }
      .blink { animation: blink 1s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </defs>

  <!-- window -->
  <rect x="10" y="10" width="800" height="280" rx="10" class="win"/>
  <rect x="10" y="10" width="800" height="34" rx="10" class="bar"/>
  <rect x="10" y="34" width="800" height="10" class="bar"/>
  <circle cx="34" cy="27" class="dot" fill="#ff5f56"/>
  <circle cx="54" cy="27" class="dot" fill="#ffbd2e"/>
  <circle cx="74" cy="27" class="dot" fill="#27c93f"/>
  <text x="410" y="32" text-anchor="middle" class="txt dim" font-size="12">akshat@deploy — zsh</text>

  <!-- terminal lines, staggered reveal -->
  <g class="txt">
    <text x="30" y="70"  class="line" style="animation-delay:0.2s">
      <tspan class="prompt">➜ </tspan><tspan class="dim">~/infra</tspan> <tspan>terraform apply</tspan>
    </text>
    <text x="30" y="95"  class="line" style="animation-delay:1.0s"><tspan class="dim">  Plan: 4 to add, 0 to change, 0 to destroy.</tspan></text>
    <text x="30" y="120" class="line" style="animation-delay:1.8s"><tspan class="ok">  ✓ aws_lambda_function.anomaly_detector created</tspan></text>
    <text x="30" y="145" class="line" style="animation-delay:2.5s"><tspan class="ok">  ✓ aws_cloudwatch_metric_alarm.cost_spike created</tspan></text>

    <text x="30" y="180" class="line" style="animation-delay:3.4s">
      <tspan class="prompt">➜ </tspan><tspan class="dim">~/infra</tspan> <tspan>kubectl get pods -n prod</tspan>
    </text>
    <text x="30" y="205" class="line" style="animation-delay:4.2s"><tspan class="info">  api-gateway-7d9f6</tspan><tspan class="dim">   Running   1/1</tspan></text>
    <text x="30" y="228" class="line" style="animation-delay:4.7s"><tspan class="info">  worker-queue-2c4a1</tspan><tspan class="dim">  Running   1/1</tspan></text>

    <text x="30" y="263" class="line" style="animation-delay:5.6s">
      <tspan class="prompt">➜ </tspan><tspan class="dim">~/infra</tspan> <tspan>healthcheck --env prod</tspan>
    </text>
    <text x="30" y="280" class="line" style="animation-delay:6.3s"><tspan class="ok">  ✓ all systems nominal — p99 42ms</tspan><tspan class="cursor blink"> ▊</tspan></text>
  </g>
</svg>
